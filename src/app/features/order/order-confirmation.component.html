<main class="confirm">
  @defer (on idle) {
    <app-qr-ticket [order]="order()" />
  } @placeholder {
    <div class="ticket-skeleton" aria-hidden="true"></div>
  } @loading (minimum 200ms) {
    <p class="loading">Imprimiendo tu ticket…</p>
  }

  <div class="actions">
    <button type="button" class="btn btn--primary" (click)="newOrder()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 18h16" />
        <path d="M6 18a6 6 0 0 1 12 0" />
        <path d="M12 6v-2" />
        <path d="m19 8 1-1" />
        <path d="m5 8-1-1" />
      </svg>
      Nuevo pedido
    </button>
    <button type="button" class="btn btn--ghost" (click)="backToMenu()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5" />
        <path d="m12 19-7-7 7-7" />
      </svg>
      Volver al menú
    </button>
  </div>
</main>
