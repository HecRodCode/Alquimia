<div class="backdrop" (click)="close.emit()"></div>

<aside class="panel" role="dialog" aria-label="Mi pedido">
  <header class="panel__head">
    <h2 class="panel__title">Mi pedido</h2>
    <button type="button" class="panel__close" aria-label="Cerrar" (click)="close.emit()">✕</button>
  </header>

  <div class="panel__body">
    @for (item of cart.items(); track item.id) {
      <article class="item">
        <div class="item__info">
          <span class="item__name">{{ item.productName }}</span>
          @if (summaryOf(item); as summary) {
            <span class="item__summary">{{ summary }}</span>
          }
          <div class="item__stepper">
            <button
              type="button"
              class="istep"
              aria-label="Quitar uno"
              (click)="changeQuantity(item, -1)"
            >
              −
            </button>
            <span class="istep__value">{{ item.quantity }}</span>
            <button
              type="button"
              class="istep"
              aria-label="Agregar uno"
              (click)="changeQuantity(item, 1)"
            >
              +
            </button>
          </div>
        </div>
        <div class="item__right">
          <span class="item__price">{{ lineTotal(item) }}</span>
          <button
            type="button"
            class="item__remove"
            aria-label="Eliminar del pedido"
            (click)="cart.remove(item.id)"
          >
            🗑
          </button>
        </div>
      </article>
    } @empty {
      <div class="empty">
        <span class="empty__icon" aria-hidden="true">🧺</span>
        <p class="empty__title">Tu bandeja está vacía</p>
        <p class="empty__text">Elige algo delicioso del menú para empezar tu pedido.</p>
      </div>
    }
  </div>

  <footer class="panel__foot">
    <div class="total-row">
      <span class="total-row__label">Total</span>
      <span class="total-row__value">{{ totalLabel() }}</span>
    </div>
    <button
      type="button"
      class="cta"
      [disabled]="cart.itemCount() === 0"
      (click)="finalize.emit()"
    >
      Finalizar pedido
    </button>
  </footer>
</aside>
